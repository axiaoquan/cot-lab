# Default configuration shared by all modules.
# Override with --config or per-module CLI flags.

model:
  name: "Qwen/Qwen2.5-1.5B-Instruct"
  device: "mps"           # mps | cuda | cpu
  torch_dtype: "bfloat16" # bfloat16 | float16 | float32
  trust_remote_code: true

generation:
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.95
  do_sample: true

dataset:
  name: "gsm8k"
  split: "test"
  cache_dir: "data/cache"

paths:
  results: "results"
  checkpoints: "checkpoints"

# Reference model used as a verifier in Module 03.
# Tries Ollama first, falls back to a HF model.
verifier:
  ollama_model: "deepseek-r1:7b"
  fallback_hf_model: "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"

# Module 05 (GRPO LoRA) defaults.
grpo:
  num_generations: 4
  max_completion_length: 512
  beta: 0.04
  learning_rate: 1.0e-6
  per_device_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_steps: 1000
  lora_r: 16
  lora_alpha: 32
  lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
